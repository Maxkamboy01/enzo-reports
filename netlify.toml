[build]
  base    = "enzo-reports/frontend"
  command = "npm run build"
  publish = "enzo-reports/frontend/dist"

[[redirects]]
  from   = "/api-shifer/*"
  to     = "https://backend-greymix.bis-apps.com/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/*"
  to     = "https://backend-greymix-sement.bis-apps.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
